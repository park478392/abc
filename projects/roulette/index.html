<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>룰렛</title>
    <style>
      * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }

      body {
        min-height: 100vh;
        padding: 48px 20px;
        font-family: "Segoe UI", "Noto Sans KR", Arial, sans-serif;
        color: #111827;
        background: linear-gradient(135deg, #ffffff, #f0fdfa);
      }

      main {
        width: min(900px, 100%);
        margin: 0 auto;
      }

      .label {
        display: inline-block;
        margin-bottom: 14px;
        padding: 8px 12px;
        border-radius: 999px;
        background: #e6fffb;
        color: #0f766e;
        font-weight: 800;
      }

      h1 {
        margin-bottom: 10px;
        font-size: clamp(2rem, 5vw, 3.2rem);
      }

      p {
        color: #5b6472;
      }

      .panel {
        display: grid;
        grid-template-columns: 0.9fr 1.1fr;
        gap: 32px;
        margin-top: 28px;
        padding: 30px;
        border-radius: 22px;
        background: #ffffff;
        box-shadow: 0 24px 60px rgba(15, 23, 42, 0.12);
      }

      .wheel-wrap {
        display: grid;
        place-items: center;
      }

      .wheel {
        width: min(280px, 70vw);
        aspect-ratio: 1;
        border-radius: 50%;
        background: conic-gradient(
          #0f766e 0 60deg,
          #99f6e4 60deg 120deg,
          #14b8a6 120deg 180deg,
          #ccfbf1 180deg 240deg,
          #2dd4bf 240deg 300deg,
          #f0fdfa 300deg 360deg
        );
        border: 10px solid #ffffff;
        box-shadow: 0 18px 40px rgba(15, 118, 110, 0.18);
        transition: transform 2.4s cubic-bezier(0.18, 0.9, 0.24, 1);
      }

      textarea {
        width: 100%;
        min-height: 150px;
        margin: 18px 0;
        padding: 14px;
        border: 1px solid #d7e4e0;
        border-radius: 16px;
        font: inherit;
        resize: vertical;
      }

      button,
      a {
        display: inline-flex;
        min-height: 46px;
        align-items: center;
        justify-content: center;
        padding: 12px 18px;
        border: 0;
        border-radius: 999px;
        background: #0f766e;
        color: #ffffff;
        font: inherit;
        font-weight: 900;
        text-decoration: none;
        cursor: pointer;
        transition:
          transform 0.25s,
          box-shadow 0.25s,
          background 0.25s;
      }

      button:hover,
      a:hover {
        transform: translateY(-3px);
        background: #115e59;
        box-shadow: 0 14px 28px rgba(15, 118, 110, 0.25);
      }

      .actions {
        display: flex;
        flex-wrap: wrap;
        gap: 12px;
      }

      .result {
        margin-top: 18px;
        padding: 18px;
        border-radius: 18px;
        background: #f8fffd;
        border: 1px solid #d7eee9;
        color: #0f766e;
        font-size: 1.25rem;
        font-weight: 900;
      }

      @media (max-width: 760px) {
        .panel {
          grid-template-columns: 1fr;
        }
      }
    </style>
  </head>

  <body>
    <main>
      <span class="label">Roulette</span>
      <h1>룰렛</h1>
      <p>선택지를 입력하고 버튼을 누르면 무작위 결과가 나옵니다.</p>

      <section class="panel">
        <div class="wheel-wrap">
          <div class="wheel" id="wheel"></div>
        </div>

        <div>
          <label for="items"><strong>선택지</strong></label>
          <textarea id="items">김치찌개, 돈가스, 제육볶음, 라멘, 햄버거, 초밥</textarea>

          <div class="actions">
            <button type="button" id="spin">룰렛 돌리기</button>
            <a href="../../assignments.html">포트폴리오로 돌아가기</a>
          </div>

          <div class="result" id="result">결과를 기다리는 중</div>
        </div>
      </section>
    </main>

    <script>
      const wheel = document.querySelector("#wheel");
      const items = document.querySelector("#items");
      const result = document.querySelector("#result");
      let degree = 0;

      document.querySelector("#spin").addEventListener("click", () => {
        const options = items.value
          .split(",")
          .map((item) => item.trim())
          .filter(Boolean);

        if (options.length === 0) {
          result.textContent = "선택지를 입력해주세요.";
          return;
        }

        const picked = options[Math.floor(Math.random() * options.length)];
        degree += 1440 + Math.floor(Math.random() * 360);
        wheel.style.transform = `rotate(${degree}deg)`;
        result.textContent = "돌리는 중...";

        window.setTimeout(() => {
          result.textContent = `결과: ${picked}`;
        }, 1900);
      });
    </script>
  </body>
</html>
